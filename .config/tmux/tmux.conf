set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins/"

set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin"

set -g default-terminal "tmux-256color"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind r
bind r source-file ~/.config/tmux/tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

bind -T root F12 \
    set prefix None \;\
    set key-table off \;\
    set status-style "fg=colour245,bg=colour238" \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    refresh-client -S

  bind -T off F12 \
    set -u prefix \;\
    set -u key-table \;\
    set -u status-style \;\
    refresh-client -S

set -g mouse on

# Support for SHIFT+ENTER passthrough
set -g extended-keys always
# Replace (not append) so reloads stay idempotent. RGB = truecolor, extkeys = SHIFT+ENTER passthrough.
set -s terminal-features "xterm*:extkeys,xterm-256color:RGB,wezterm:RGB"

# Numbering for sessions and panes 
set -g base-index 1 
setw -g pane-base-index 1 
set -g renumber-windows on

# Longer history scrollback
set -g history-limit 50000

# Only resize active views
setw -g aggressive-resize on 

# Desktop notification passthrough
set -g allow-passthrough on

# Vim copy mode (explicit, not reliant on $EDITOR)
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
# Copy to BOTH tmux buffer and the macOS clipboard, then leave copy mode
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
# Mouse drag-release: copy to clipboard AND exit copy mode (no more pressing q)
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
set -s escape-time 0

# Wheel up: enter copy mode with auto-exit at the bottom for clean fast scrolling.
# If an alt-screen app (less, vim, etc.) or already in copy mode, just forward the wheel.
bind-key -T root WheelUpPane if-shell -F -t = "#{||:#{pane_in_mode},#{alternate_on}}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"

# Focus and awareness
set-option -g focus-events on
set -g bell-action any
set -g visual-bell off 
set -g display-time 3000

# tpm plugin
set -g @plugin "tmux-plugins/tpm"

# plugins list
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin "catppuccin/tmux#v2.1.3" # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @plugin "tmux-plugins/tmux-cpu"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"

# persistence
set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"

# theme
set -g pane-border-format "#{pane_index} #{pane_title}"
set -g pane-border-status top 
bind-key P command-prompt -p "Pane title:" "select-pane -T '%%'"

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# Prune resurrect saves - keep last 10
run-shell 'files=$(ls -t ~/.config/tmux/resurrect/tmux_resurrect_*.txt 2>/dev/null | tail -n +11); n=$(echo "$files" | grep -c .); [ "$n" -gt 0 ] && echo "$files" | xargs rm -f && tmux display-message "Pruned $n old tmux-resurrect save fiels" || true'

# init TPM - must be kept at bottom
run "~/.config/tmux/plugins/tpm/tpm"

# Override catppuccin's low-contrast copy-mode selection highlight (must come after TPM init)
set -g mode-style "fg=#1e1e2e,bg=#b4befe,bold"
